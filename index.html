// Extend Phaser.Scene for global helpers
Phaser.Scene.prototype.addMuteButton = function() {
    let x = 760, y = 30;
    let container = this.add.container(x, y).setDepth(1000).setScrollFactor(0);
    let bg = this.add.circle(0, 0, 20, 0x000000, 0.4).setInteractive({cursor:'pointer'});
    let icon = this.add.text(0, 0, SoundEffect.isMuted ? '🔇' : '🔊', {fontSize:'24px'}).setOrigin(0.5);
    container.add([bg, icon]);
    
    bg.on('pointerdown', (ptr, x, y, event) => {
        event.stopPropagation();
        let muted = SoundEffect.toggleMute();
        icon.setText(muted ? '🔇' : '🔊');
    });
    
    this.tweens.add({ targets:container, scale:1.1, duration:200, ease:'Back.easeOut', paused:true, callbackScope:this });
    bg.on('pointerover', () => { bg.setFillStyle(0x000000, 0.6); });
    bg.on('pointerout', () => { bg.setFillStyle(0x000000, 0.4); });
};

// ─── SOUND MANAGER ──────────────────────────────────────
const SoundEffect = {
    audioCtx: null,
    isMuted: false,
    musicOsc: null,
    musicGain: null,
    init() { if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); },
    _play(freq1, freq2, duration, waveform='sine') {
        if (this.isMuted) return;
        this.init();
        const osc = this.audioCtx.createOscillator(), gain = this.audioCtx.createGain();
        osc.type = waveform;
        osc.frequency.setValueAtTime(freq1, this.audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq2, this.audioCtx.currentTime + duration);
        gain.gain.setValueAtTime(0.12, this.audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(this.audioCtx.destination);
        osc.start(); osc.stop(this.audioCtx.currentTime + duration);
    },
    playCorrect() { this._play(440, 880, 0.3); },
    playWrong()   { this._play(110, 55, 0.4, 'sawtooth'); },
    playPop()     { this._play(200, 600, 0.1); },
    playWin()     { [523,659,784,1047].forEach((f,i) => setTimeout(()=>this._play(f,f*1.1,0.3),i*120)); },
    
    // Background Music Synthesis
    startMusic() {
        this.init();
        if (this.musicOsc) return;
        this.musicGain = this.audioCtx.createGain();
        this.musicGain.gain.setValueAtTime(this.isMuted ? 0 : 0.12, this.audioCtx.currentTime);
        this.musicGain.connect(this.audioCtx.destination);
        
        this._playMelody();
    },
    _playMelody() {
        if (!this.musicGain) return;
        const notes = [261.63, 293.66, 329.63, 349.23, 392.00]; // C4, D4, E4, F4, G4
        let now = this.audioCtx.currentTime;
        for (let i = 0; i < 8; i++) {
            let osc = this.audioCtx.createOscillator();
            let g = this.audioCtx.createGain();
            osc.frequency.setValueAtTime(notes[Math.floor(Math.random() * notes.length)], now + i * 0.5);
            g.gain.setValueAtTime(0, now + i * 0.5);
            g.gain.linearRampToValueAtTime(0.05, now + i * 0.5 + 0.1);
            g.gain.linearRampToValueAtTime(0, now + i * 0.5 + 0.4);
            osc.connect(g); g.connect(this.musicGain);
            osc.start(now + i * 0.5); osc.stop(now + i * 0.5 + 0.5);
        }
        setTimeout(() => this._playMelody(), 4000);
    },
    toggleMute() {
        this.isMuted = !this.isMuted;
        if (this.musicGain) {
            this.musicGain.gain.setTargetAtTime(this.isMuted ? 0 : 0.12, this.audioCtx.currentTime, 0.1);
        }
        return this.isMuted;
    }
};

function drawDesertBackground(scene) {

    // Pleasant "Warm Sky" Gradient: Peach/Orange to Sky Blue
    sky.fillGradientStyle(0xFF7E5F, 0xFF7E5F, 0xFEB47B, 0xFEB47B, 1);
    sky.fillRect(0, 0, 800, 600);
    scene.skyGraphics = sky;

    scene.stars = scene.add.graphics().setDepth(0.1);
    scene.stars.fillStyle(0xFFFFFF, 0.8);
    for (let i=0; i<60; i++) {
        let x = Phaser.Math.Between(0,800), y = Phaser.Math.Between(0,250), r = Phaser.Math.Between(1,2);
        let star = scene.add.circle(x, y, r, 0xFFFFFF).setDepth(0.1).setAlpha(0);
        scene.tweens.add({ targets: star, alpha: { from: 0.1, to: 0.8 }, duration: Phaser.Math.Between(1000, 3000), yoyo: true, repeat: -1, delay: Phaser.Math.Between(0, 2000) });
    }

    scene.celestial = scene.add.container(700, 100).setDepth(0.2);
    scene.sun = scene.add.graphics(); scene.sun.fillStyle(0xFFD700,1); scene.sun.fillCircle(0,0,50); scene.celestial.add(scene.sun);
    scene.moon = scene.add.graphics(); scene.moon.fillStyle(0xDFE6E9,1); scene.moon.fillCircle(0,0,45); scene.moon.setAlpha(0); scene.celestial.add(scene.moon);

    let env = scene.add.graphics().setDepth(0.3);
    // Mountains
    env.fillStyle(0x8B4513,1); env.fillTriangle(100,325,300,325,200,125);
    env.fillStyle(0xA0522D,1); env.fillTriangle(400,325,700,325,550,75);
    env.fillStyle(0xCD853F,1); env.fillTriangle(600,325,900,325,750,175);
    
    // Ground with "Sand Dunes" detail
    env.fillStyle(0xF4A460,1); env.fillRoundedRect(-50,225,900,425,50);
    env.fillStyle(0xED9153,0.4); // Dune Highlights
    for(let i=0; i<10; i++) env.fillEllipse(Phaser.Math.Between(0,800), Phaser.Math.Between(250,550), Phaser.Math.Between(100,300), 20);
    
    env.fillStyle(0x2E8B57,1);
    env.fillRoundedRect(50,172,20,60,10); env.fillRoundedRect(35,192,50,10,5);

    createCloud(scene, 100, 80); createCloud(scene, 500, 60);
    for (let i=0; i<3; i++) createBird(scene);
}

function createBird(scene) {
    let bird = scene.add.graphics().setDepth(2);
    bird.lineStyle(2, 0x000000); bird.beginPath(); bird.moveTo(-10,0); bird.lineTo(0,5); bird.lineTo(10,0); bird.strokePath();
    let x = Phaser.Math.Between(0,800), y = Phaser.Math.Between(50,150);
    bird.setPosition(x, y);
    scene.tweens.add({ targets: bird, x:x+200, y:y+Phaser.Math.Between(-20,20), duration:5000+Math.random()*3000, repeat:-1, yoyo:true, ease:'Sine.easeInOut' });
    scene.time.addEvent({ delay:200, loop:true, callback:()=>{ bird.scaleY = bird.scaleY===1 ? -0.5 : 1; } });
}

function createCloud(scene, x, y) {
    let c = scene.add.graphics({x,y}).setDepth(0.4);
    c.fillStyle(0xFFFFFF,0.8); c.fillCircle(0,0,30); c.fillCircle(30,-10,40); c.fillCircle(60,0,30); c.fillRoundedRect(-10,0,80,30,15);
    scene.tweens.add({ targets:c, x:x+100, duration:10000+Math.random()*5000, yoyo:true, repeat:-1, ease:'Sine.easeInOut' });
}

// ─── HELPERS ────────────────────────────────────────────
function burstSand(scene, x, y) {
    for (let i=0; i<8; i++) {
        let p = scene.add.graphics({x,y}).setDepth(5); p.fillStyle(0xF4A460,1); p.fillCircle(0,0,4+Math.random()*3);
        let a=Math.random()*Math.PI, d=30+Math.random()*50;
        scene.tweens.add({ targets:p, x:x+Math.cos(a)*d, y:y-Math.sin(a)*d+40, alpha:0, duration:400+Math.random()*200, ease:'Quad.easeOut', onComplete:()=>p.destroy() });
    }
}

    let t = scene.add.text(x,y,msg,{font:'bold 32px Arial',fill:color,stroke:'#fff',strokeThickness:4}).setOrigin(0.5).setDepth(60);
    scene.tweens.add({ targets:t, y:y-80, alpha:0, duration:1000, ease:'Cubic.easeOut', onComplete:()=>t.destroy() });
}

    scene.tweens.add({ targets:c, scale:1, duration:350, ease:'Back.easeOut' });

function showCorrectFeedback(scene, x, y) {
    let flash = scene.add.graphics().setDepth(180).setAlpha(0);
    flash.fillStyle(0x00E676,0.18); flash.fillRect(0,0,800,600);

function showIncorrectFeedback(scene, x, y) {
    let flash = scene.add.graphics().setDepth(180).setAlpha(0);
    flash.fillStyle(0xFF1744,0.2); flash.fillRect(0,0,800,600);
    scene.tweens.add({ targets:flash, alpha:1, duration:80, yoyo:true, repeat:1, onComplete:()=>flash.destroy() });
    scene.cameras.main.shake(250, 0.007);
    let cross = scene.add.text(x,y-40,'✗',{font:'bold 80px Arial',fill:'#FF1744',stroke:'#fff',strokeThickness:4}).setOrigin(0.5).setDepth(70).setScale(0);
    scene.tweens.add({ targets:cross, scale:1, duration:200, ease:'Back.easeOut' });

    showFloatingText(scene, x, y-80, 'Wrong!', '#FF1744');
}

// ─── MATH GEN ───────────────────────────────────────────
function generatePowerOf10Equation(level) {
    let multiplicand, multiplier, correctAnswer;
    if (level==='easy') { multiplicand=Phaser.Math.Between(1,99); multiplier=Math.random()<0.5?10:100; correctAnswer=multiplicand*multiplier; }
    else if (level==='medium') {
        if (Math.random()>0.5) { multiplicand=(Phaser.Math.Between(10,99)/10).toFixed(1); multiplier=Math.random()<0.5?10:100; correctAnswer=(Number(multiplicand)*multiplier).toFixed(1).replace(/\.0$/,''); }
        else { multiplicand=Phaser.Math.Between(10,990); multiplier=Math.random()<0.5?10:100; correctAnswer=multiplicand*multiplier; }
    } else { let d=Phaser.Math.Between(1,3); multiplicand=(Phaser.Math.Between(1,999)/Math.pow(10,d)).toFixed(d); multiplier=Math.random()<0.5?100:1000; correctAnswer=parseFloat((Number(multiplicand)*multiplier).toPrecision(12)).toString(); }
    let isCorrect=Math.random()<0.5, displayAnswer=correctAnswer;
    if (!isCorrect) {
        let e=Phaser.Math.Between(0,2);
        if (e===0) displayAnswer=(Number(correctAnswer)*10).toString();
        else if (e===1) displayAnswer=(Number(correctAnswer)/10).toString();
        else { let v=Number(correctAnswer); v+=v>=100?10:(v>10?1:0.1); displayAnswer=parseFloat(v.toPrecision(12)).toString(); }
        if (displayAnswer===correctAnswer) displayAnswer=(Number(correctAnswer)+10).toString();
    }
    return { text:`${multiplicand} x ${multiplier}\n= ${displayAnswer}`, isCorrect };
}

// ─── HAMMER ─────────────────────────────────────────────
class Hammer extends Phaser.GameObjects.Container {
    constructor(scene) {
        super(scene,0,0); this.setScale(0.7); this.angle=-20;
        let handle=scene.add.graphics(); handle.fillStyle(0x8B4513,1); handle.fillRoundedRect(-10,-50,20,80,5);
        let head=scene.add.graphics(); head.fillStyle(0x607D8B,1); head.fillRoundedRect(-40,-70,80,40,10);
        let h1=scene.add.graphics(); h1.fillStyle(0x455A64,1); h1.fillRoundedRect(-45,-65,10,30,5);
        let h2=scene.add.graphics(); h2.fillStyle(0x455A64,1); h2.fillRoundedRect(35,-65,10,30,5);
        this.add([handle,head,h1,h2]); this.setDepth(100); scene.add.existing(this); this.isSwinging=false;
    }
    swing() {
        if (this.isSwinging) return; this.isSwinging=true;
        this.scene.tweens.add({ targets:this, angle:45, duration:60, yoyo:true, ease:'Sine.easeInOut', onComplete:()=>{ this.angle=-20; this.isSwinging=false; } });
    }
}

// ─── MOLE ───────────────────────────────────────────────
class Mole extends Phaser.GameObjects.Container {
    constructor(scene, x, y) {
        super(scene,x,y);
        this.baseY=y; this.popY=y-35; this.isActive=false; this.isEquationCorrect=false; this.wasHit=false;
        this.y=this.baseY+160;
        let body=scene.add.graphics(); body.fillStyle(0x8D6E63,1); body.fillRoundedRect(-30,-30,60,80,30);
        let snout=scene.add.graphics(); snout.fillStyle(0xD7CCC8,1); snout.fillEllipse(0,-5,30,20);
        let nose=scene.add.graphics(); nose.fillStyle(0x000000,1); nose.fillEllipse(0,-12,10,7);
        this.leftEye=scene.add.graphics(); this.rightEye=scene.add.graphics(); this.mouth=scene.add.graphics();
        this.bubble=scene.add.graphics();
        this.bubble.fillStyle(0xFFFFFF,0.95); this.bubble.lineStyle(2,0x000000);
        this.bubble.fillRoundedRect(-55,-100,110,60,10); this.bubble.strokeRoundedRect(-55,-100,110,60,10);
        this.bubble.fillTriangle(-8,-42,8,-42,-10,-32); this.bubble.strokeTriangle(-8,-42,8,-42,-10,-32);
        this.answerText=scene.add.text(0,-70,'',{font:'bold 13px Arial',fill:'#000',align:'center'}).setOrigin(0.5);
        this.add([body,snout,nose,this.leftEye,this.rightEye,this.mouth,this.bubble,this.answerText]);
        let maskRect=scene.make.graphics(); maskRect.fillStyle(0xffffff); maskRect.fillRect(x-150,y-200,300,200);
        this.setMask(maskRect.createGeometryMask());
        scene.add.existing(this); this.setHappy(); this.setSize(110,140); this.setDepth(10);
    }
    drawFace(mode) {
        this.leftEye.clear(); this.rightEye.clear(); this.mouth.clear();
        this.leftEye.fillStyle(0xFFFFFF,1); this.leftEye.fillCircle(-12,-20,7);
        this.rightEye.fillStyle(0xFFFFFF,1); this.rightEye.fillCircle(12,-20,7);
        if (mode==='happy') {
            this.leftEye.fillStyle(0x000000,1); this.leftEye.fillCircle(-12,-20,3);
            this.rightEye.fillStyle(0x000000,1); this.rightEye.fillCircle(12,-20,3);
            this.mouth.lineStyle(2,0x000000); this.mouth.beginPath(); this.mouth.arc(0,-10,8,0.2,Math.PI-0.2,false); this.mouth.strokePath();
        } else {
            this.leftEye.lineStyle(2,0x000000); this.leftEye.beginPath();
            this.leftEye.moveTo(-17,-23); this.leftEye.lineTo(-7,-17); this.leftEye.moveTo(-17,-17); this.leftEye.lineTo(-7,-23); this.leftEye.strokePath();
            this.rightEye.lineStyle(2,0x000000); this.rightEye.beginPath();
            this.rightEye.moveTo(7,-23); this.rightEye.lineTo(17,-17); this.rightEye.moveTo(7,-17); this.rightEye.lineTo(17,-23); this.rightEye.strokePath();
            this.mouth.lineStyle(2,0x000000); this.mouth.beginPath(); this.mouth.arc(0,0,8,Math.PI+0.5,2*Math.PI-0.5,false); this.mouth.strokePath();
        }
    }
    setHappy() { this.drawFace('happy'); }
    setSad()   { this.drawFace('sad');   }
    pop(equationObj, duration) {
        if (this.popTween) this.popTween.stop();
        this.isActive=true; this.wasHit=false; this.isEquationCorrect=equationObj.isCorrect;
        this.answerText.setText(equationObj.text); this.setHappy();
        this.y=this.baseY+160; burstSand(this.scene,this.x,this.baseY); SoundEffect.playPop();
        this.popTween=this.scene.tweens.add({ targets:this, y:this.popY, duration:400, ease:'Back.easeOut',
            onComplete:()=>{ this.hideTimer=this.scene.time.delayedCall(duration,()=>{ if(this.isActive) this.hide(); }); }
        });
    }
    hide() {
        if (!this.isActive) return; this.isActive=false;
        if (this.hideTimer) this.hideTimer.remove(); if (this.popTween) this.popTween.stop();
        this.scene.tweens.add({ targets:this, y:this.baseY+160, duration:350, ease:'Quad.easeIn' });
    }
    hit() {
        if (!this.isActive||this.wasHit) return; this.wasHit=true; this.isActive=false;
        if (this.hideTimer) this.hideTimer.remove(); if (this.popTween) this.popTween.stop();
        this.setSad(); burstSand(this.scene,this.x,this.baseY);
        this.scene.time.delayedCall(600,()=>{
            this.scene.tweens.add({ targets:this, y:this.baseY+160, scaleY:0.6, scaleX:1.1, duration:200, ease:'Quad.easeIn',
                onComplete:()=>{ this.scaleX=1; this.scaleY=1; this.wasHit=false; }
            });
        });
    }
}

class StartScene extends Phaser.Scene {

    create() {

        // Decorative floating moles — more visible

        this._floatingMole(700, 350, 0.50);
        this._floatingMole(140, 440, 0.48);
        this._floatingMole(645, 185, 0.52);

        // Centered card panel — with dark border so corners are crisp
        let panel = this.add.graphics().setDepth(6);
        panel.lineStyle(4, 0x4A2800, 1);
        panel.fillStyle(0x8B4513, 1);    panel.fillRoundedRect(220, 170, 360, 280, 24);
        panel.strokeRoundedRect(220, 170, 360, 280, 24);
        panel.fillStyle(0xA0522D, 1);    panel.fillRoundedRect(228, 178, 344, 264, 18);

        // Hammer emoji icon instead of paw
        this.add.text(400, 215, '🔨', { font:'52px Arial' }).setOrigin(0.5).setDepth(7);

        // Title
        this.add.text(400, 278, 'Powers of 10', {
            font: 'bold 42px Arial', fill: '#FFD700', stroke: '#000', strokeThickness: 6
        }).setOrigin(0.5).setDepth(7);

        // Subtitle
        this.add.text(400, 325, 'Smash the correct equations!', {
            font: '20px Arial', fill: '#FFF'
        }).setOrigin(0.5).setDepth(7);

        // Start background music on user interaction (splash screen)
        SoundEffect.startMusic();
        
        // Mute Button
        this.addMuteButton();

        // Start Game button — wrapped in container so scale pivot is centered
        let btnX=400, btnY=390;
        let btnContainer = this.add.container(btnX, btnY).setDepth(8);
        let btnBg = this.add.graphics(); btnBg.fillStyle(0xFF5722,1); btnBg.fillRoundedRect(-90,-24,180,48,24);
        let btnLbl = this.add.text(0, 0, 'Start Game', {font:'bold 22px Arial',fill:'#FFF'}).setOrigin(0.5);
        btnContainer.add([btnBg, btnLbl]);

        let btnZone = this.add.zone(btnX,btnY,180,48).setInteractive({cursor:'pointer'}).setDepth(9);
        btnZone.on('pointerover',()=>{ btnBg.clear(); btnBg.fillStyle(0xE64A19,1); btnBg.fillRoundedRect(-90,-24,180,48,24); });
        btnZone.on('pointerout', ()=>{ btnBg.clear(); btnBg.fillStyle(0xFF5722,1); btnBg.fillRoundedRect(-90,-24,180,48,24); });
        btnZone.on('pointerdown', ()=>{
            this.tweens.add({ targets:[panel,btnBg,btnLbl], alpha:0, duration:400, onComplete:()=>this.scene.start('TutorialScene') });
        });

        this.tweens.add({ targets:btnContainer, scaleX:1.06, scaleY:1.06, duration:800, yoyo:true, repeat:-1, ease:'Sine.easeInOut' });

    _floatingMole(x, y, alpha) {
        let g = this.add.graphics({x,y}).setDepth(1).setAlpha(alpha);
        g.fillStyle(0x8D6E63,1); g.fillRoundedRect(-22,-22,44,58,20);
        g.fillStyle(0xD7CCC8,1); g.fillEllipse(0,-3,22,14);
        g.fillStyle(0x000000,1); g.fillCircle(-7,-10,3); g.fillCircle(7,-10,3); g.fillEllipse(0,-7,7,4);
        this.tweens.add({ targets:g, y:y-15, duration:2000+Math.random()*1000, yoyo:true, repeat:-1, ease:'Sine.easeInOut' });
    }
}

        let skipBg = this.add.graphics().setDepth(29);
        skipBg.fillStyle(0x3E2723,0.9); skipBg.fillRoundedRect(602,566,185,28,14);
        let skipTxt = this.add.text(694,580,'Skip tutorial  →',{font:'bold 16px Arial',fill:'#FFD700'}).setOrigin(0.5).setDepth(30);
        let skipZone = this.add.zone(694,580,185,28).setInteractive({cursor:'pointer'}).setDepth(31);
        skipZone.on('pointerover', ()=>{ skipBg.clear(); skipBg.fillStyle(0x5D4037,0.95); skipBg.fillRoundedRect(602,566,185,28,14); });
        skipZone.on('pointerout',  ()=>{ skipBg.clear(); skipBg.fillStyle(0x3E2723,0.9); skipBg.fillRoundedRect(602,566,185,28,14); });
        skipZone.on('pointerdown', ()=>this._goToMenu());

        // Hint caption bar — taller for better readability
        let captionBg = this.add.graphics().setDepth(20);
        captionBg.fillStyle(0x4E342E,0.95); captionBg.fillRoundedRect(130,57,540,44,14);
        captionBg.lineStyle(2,0xFFD700,0.6); captionBg.strokeRoundedRect(130,57,540,44,14);
        this.caption = this.add.text(400,79,'',{font:'bold 17px Arial',fill:'#FFD700',stroke:'#000',strokeThickness:2}).setOrigin(0.5).setDepth(21);

        // Score display (mini)
        let scoreBg = this.add.graphics().setDepth(20);
        scoreBg.fillStyle(0x8B4513,1); scoreBg.fillRoundedRect(20,60,100,40,8);
        scoreBg.fillStyle(0xA0522D,1); scoreBg.fillRoundedRect(24,64,92,32,6);
        this.add.text(70,72,'SCORE',{font:'bold 10px Arial',fill:'#FFD700'}).setOrigin(0.5).setDepth(21);
        this.tutScore = 0;
        this.tutScoreText = this.add.text(70,84,'0',{font:'bold 16px Arial',fill:'#FFF'}).setOrigin(0.5).setDepth(21);

        // Holes + moles
        this.tutMoles = [];
        let holePositions = [[200,370],[400,370],[600,370],[300,460],[500,460]];
        let bgHoles = this.add.graphics().setDepth(1);
        holePositions.forEach(([hx,hy])=>{
            bgHoles.fillStyle(0x3E2723,1); bgHoles.fillEllipse(hx,hy,100,35);
            this.tutMoles.push(new Mole(this,hx,hy));
        });

        // Bot hammer (no pointer event needed, purely visual)
        this.botHammer = new Hammer(this);
        this.botHammer.setPosition(-100, -100); // start offscreen

        // Phase indicator dots
        this.totalPhases = 5;
        this.dotGraphics = this.add.graphics().setDepth(21);
        this._drawDots(0);

        // Start bot demo
        this.time.delayedCall(600, ()=>this._runPhase(0));
    }

    _drawDots(currentPhase) {
        this.dotGraphics.clear();
        for (let i=0; i<this.totalPhases; i++) {
            let active = i===currentPhase;
            this.dotGraphics.fillStyle(active ? 0xFFD700 : 0xFFFFFF, active ? 1 : 0.4);
            this.dotGraphics.fillCircle(340+i*30, 555, active ? 8 : 5);
        }
    }

    _setCaption(text) { this.caption.setText(text); }

    _goToMenu() { this.scene.start('LevelSelectScene'); }

    // ── BOT DEMO PHASES ───────────────────────────────
    _runPhase(phase) {
        if (phase >= this.totalPhases) { this.time.delayedCall(800, ()=>this._goToMenu()); return; }
        this._drawDots(phase);

        switch(phase) {
            case 0: this._phase_MolePopsUp(); break;
            case 1: this._phase_BotHitsCorrect(); break;
            case 2: this._phase_WrongMoleIgnored(); break;
            case 3: this._phase_BothMolesChooseCorrect(); break;
            case 4: this._phase_TargetReached(); break;
        }
    }

    _nextPhase(phase, delay=2800) {
        this.time.delayedCall(delay, ()=>this._runPhase(phase+1));
    }

    // Phase 0: Explain moles pop out
    _phase_MolePopsUp() {
        this._setCaption('🦔  A mole pops out showing an equation!');
        let mole = this.tutMoles[2];
        mole.pop({ text:'5 x 10\n= 50', isCorrect:true }, 4000);
        // Animate caption arrow pointing at bubble
        this.time.delayedCall(900, ()=>{
            // Arrow points to bubble which is above mole.y; bubble right edge ≈ mole.x+60
            let arrowBg = this.add.graphics().setDepth(24);
            arrowBg.fillStyle(0x000000,0.55); arrowBg.fillRoundedRect(mole.x+62, mole.y-115, 130, 30, 8);
            let arrow = this.add.text(mole.x+88, mole.y-100,'👈 Read this!',{font:'bold 14px Arial',fill:'#FFD700'}).setOrigin(0,0.5).setDepth(25);
            this.tweens.add({ targets:[arrow,arrowBg], x:'+=0', alpha:{from:1,to:0.4}, duration:500, yoyo:true, repeat:2, onComplete:()=>{ arrow.destroy(); arrowBg.destroy(); } });
        });
        this._nextPhase(0, 3200);
    }

    // Phase 1: Bot moves hammer and smashes correct mole
    _phase_BotHitsCorrect() {
        this._setCaption('✅  If it is CORRECT — SMASH IT! Get +10 points!');
        let mole = this.tutMoles[1];
        mole.pop({ text:'7 x 100\n= 700', isCorrect:true }, 5000);

        // Move bot hammer to mole position after a small delay
        this.botHammer.setPosition(750, 200);
        this.time.delayedCall(1200, ()=>{
            this.tweens.add({ targets:this.botHammer, x:mole.x, y:mole.y-60, duration:600, ease:'Cubic.easeInOut',
                onComplete:()=>{
                    this.botHammer.swing();
                    mole.hit();
                    SoundEffect.playCorrect();
                    // Green flash + score
                    showCorrectFeedback(this, mole.x, mole.y);
                    this.tutScore+=10; this.tutScoreText.setText(this.tutScore.toString());
                    // Move hammer back
                    this.time.delayedCall(700, ()=>this.tweens.add({ targets:this.botHammer, x:720, y:180, duration:400, ease:'Cubic.easeOut' }));
                }
            });
        });
        this._nextPhase(1, 3800);
    }

    // Phase 2: Wrong mole pops up, bot shakes hammer (no-no) and leaves it
    _phase_WrongMoleIgnored() {
        this._setCaption('❌  If it is WRONG — leave it! Don\'t smash wrong ones!');
        let mole = this.tutMoles[3];
        mole.pop({ text:'4 x 10\n= 400', isCorrect:false }, 4500);

        this.botHammer.setPosition(720, 180);
        this.time.delayedCall(1000, ()=>{
            // Move toward mole then pause/shake (hesitation)
            this.tweens.add({ targets:this.botHammer, x:mole.x+60, y:mole.y-80, duration:600, ease:'Cubic.easeInOut',
                onComplete:()=>{
                    // Shake side to side (shake = "no!")
                    this.tweens.add({ targets:this.botHammer, x:mole.x+60+20, duration:80, yoyo:true, repeat:5, ease:'Sine.easeInOut' });
                    // Show big X without hitting
                    let cross = this.add.text(mole.x,mole.y-40,'✗',{font:'bold 60px Arial',fill:'#FF1744',stroke:'#fff',strokeThickness:4}).setOrigin(0.5).setDepth(70).setScale(0);
                    this.tweens.add({ targets:cross, scale:1, duration:200, ease:'Back.easeOut' });
                    this.tweens.add({ targets:cross, alpha:0, delay:1200, duration:500, onComplete:()=>cross.destroy() });
                    this.time.delayedCall(900, ()=>{
                        this.tweens.add({ targets:this.botHammer, x:720, y:180, duration:400, ease:'Cubic.easeOut' });
                        mole.hide();
                    });
                }
            });
        });
        this._nextPhase(2, 3800);
    }

    // Phase 3: Two moles, bot picks the correct one
    _phase_BothMolesChooseCorrect() {
        this._setCaption('🎯  Two moles! Find and smash only the CORRECT one!');
        let wrong   = this.tutMoles[0];
        let correct = this.tutMoles[4];
        wrong.pop(  { text:'3 x 100\n= 3000', isCorrect:false }, 5000);
        correct.pop({ text:'3 x 100\n= 300',  isCorrect:true  }, 5000);

        this.botHammer.setPosition(720, 180);
        this.time.delayedCall(1000, ()=>{
            // Move toward wrong mole first (pretend to consider)
            this.tweens.add({ targets:this.botHammer, x:wrong.x+50, y:wrong.y-80, duration:500, ease:'Cubic.easeInOut',
                onComplete:()=>{
                    // Hesitate then move to correct
                    this.time.delayedCall(400, ()=>{
                        this.tweens.add({ targets:this.botHammer, x:correct.x, y:correct.y-60, duration:600, ease:'Cubic.easeInOut',
                            onComplete:()=>{
                                this.botHammer.swing(); correct.hit(); SoundEffect.playCorrect();
                                showCorrectFeedback(this, correct.x, correct.y);
                                this.tutScore+=10; this.tutScoreText.setText(this.tutScore.toString());
                                this.time.delayedCall(700, ()=>{ wrong.hide(); this.tweens.add({ targets:this.botHammer, x:720, y:180, duration:400 }); });
                            }
                        });
                    });
                }
            });
        });
        this._nextPhase(3, 4200);
    }

    // Phase 4: Show score + target, celebrate
    _phase_TargetReached() {
        this._setCaption('🏆  Reach the target score to WIN the game!');

        // Progress bar
        let barBg = this.add.graphics().setDepth(25);
        barBg.fillStyle(0x5D4037,1); barBg.fillRoundedRect(150,430,500,30,8);
        let bar = this.add.graphics().setDepth(26);
        let labelTarget = this.add.text(400,415,'Score: 0 / 50',{font:'bold 18px Arial',fill:'#FFD700'}).setOrigin(0.5).setDepth(26);

        let val={v:0};
        this.tweens.add({ targets:val, v:50, duration:2000, ease:'Cubic.easeInOut',
            onUpdate:()=>{
                let pct=Math.min(val.v/50,1);
                bar.clear(); bar.fillStyle(pct<0.7?0xF39C12:0x27AE60,1); bar.fillRoundedRect(150,430,500*pct,30,8);
                labelTarget.setText(`Score: ${Math.floor(val.v)} / 50`);
            },
            onComplete:()=>{
                SoundEffect.playWin();
                let win=this.add.text(400,490,'🎉 You Win! Now it\'s YOUR turn!',{font:'bold 24px Arial',fill:'#FFD700',stroke:'#000',strokeThickness:4}).setOrigin(0.5).setDepth(27).setScale(0);
                this.tweens.add({ targets:win, scale:1, duration:500, ease:'Back.easeOut' });
                this.time.delayedCall(2000, ()=>this._goToMenu());
            }
        });
    }
}

        let board=this.add.graphics().setDepth(5);

    // Smaller 'How to Play' pill button (110x32)

        let z=this.add.zone(x,y,110,32).setInteractive({cursor:'pointer'});

        z.on('pointerover',()=>{ bg.clear(); bg.fillStyle(hover,1); bg.fillRoundedRect(x-55,y-16,110,32,8); });

    }
}

// SCENE 4 — GAME
// ════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene {
    constructor() { super('GameScene'); }
    init(data) { this.level=data.level||'easy'; }
    create() {
        this.score=0; this.moles=[]; this.comboCount=0; this.targetScore=TARGET_SCORES[this.level]; this.gameOver=false; this._nightStarted=false;
        this.input.setDefaultCursor('none');
        drawDesertBackground(this); this.drawUI();
        let bgHoles=this.add.graphics().setDepth(1);
        for (let row=0; row<3; row++) {
            for (let col=0; col<3; col++) {
                let hx=100+col*300, hy=320+row*100;
                if (row===1) hx+=150; if (row===1&&col===2) continue;
                bgHoles.fillStyle(0x3E2723,1); bgHoles.fillEllipse(hx,hy,100,35);
                this.moles.push(new Mole(this,hx,hy));
            }
        }
        this.hammer=new Hammer(this); this.isHammerActive=true;
        this.input.on('pointermove',(ptr)=>{ if(this.isHammerActive){ this.hammer.x=ptr.x; this.hammer.y=ptr.y; } });
        this.input.on('pointerdown',(ptr)=>{
            if (!this.isHammerActive||this.gameOver) return;
            this.hammer.swing();
            for (let mole of [...this.moles].sort((a,b)=>b.y-a.y)) {
                if (mole.isActive&&!mole.wasHit&&Phaser.Geom.Rectangle.Contains(new Phaser.Geom.Rectangle(mole.x-75,mole.y-145,150,170),ptr.x,ptr.y)) {
                    this.checkHit(mole); break;
                }
            }
        });
        this.events.on('scoreUpdate',()=>{ if(this.score>=this.targetScore/2) this.transitionToNight(); });
        this.addMuteButton();
        this.queueSpawn();
    }
    transitionToNight() {
        if (this._nightStarted) return; this._nightStarted=true;
        this.tweens.addCounter({ from:0, to:100, duration:6000,
            onUpdate:(tw)=>{
                let s1=Phaser.Display.Color.Interpolate.ColorWithColor(Phaser.Display.Color.ValueToColor(0x87CEEB),Phaser.Display.Color.ValueToColor(0x1a2a6c),100,tw.getValue());
                let s2=Phaser.Display.Color.Interpolate.ColorWithColor(Phaser.Display.Color.ValueToColor(0x4a90e2),Phaser.Display.Color.ValueToColor(0x0a1128),100,tw.getValue());
                this.skyGraphics.clear();
                this.skyGraphics.fillGradientStyle(Phaser.Display.Color.GetColor(s2.r,s2.g,s2.b),Phaser.Display.Color.GetColor(s2.r,s2.g,s2.b),Phaser.Display.Color.GetColor(s1.r,s1.g,s1.b),Phaser.Display.Color.GetColor(s1.r,s1.g,s1.b),1);
                this.skyGraphics.fillRect(0,0,800,600);
                this.sun.setAlpha(1-tw.getValue()/100); this.moon.setAlpha(tw.getValue()/100); this.stars.setAlpha(tw.getValue()/100);
            }
        });
    }
    drawUI() {
        let ui=this.add.graphics().setDepth(20);
        ui.fillStyle(0x8B4513,1); ui.fillRoundedRect(20,20,150,60,10);
        ui.fillStyle(0xA0522D,1); ui.fillRoundedRect(25,25,140,50,8);
        this.add.text(95,40,'SCORE',{font:'bold 12px Arial',fill:'#FFD700'}).setOrigin(0.5).setDepth(21);
        this.scoreText=this.add.text(95,60,'0',{font:'bold 22px Arial',fill:'#FFF'}).setOrigin(0.5).setDepth(21);
        ui.fillStyle(0x8B4513,1); ui.fillRoundedRect(630,20,150,60,10);
        ui.fillStyle(0xA0522D,1); ui.fillRoundedRect(635,25,140,50,8);
        this.add.text(705,40,'TARGET',{font:'bold 12px Arial',fill:'#FFD700'}).setOrigin(0.5).setDepth(21);
        this.add.text(705,60,`${this.targetScore}`,{font:'bold 22px Arial',fill:'#FFF'}).setOrigin(0.5).setDepth(21);
        ui.fillStyle(0x795548,1); ui.fillRoundedRect(20,90,760,18,4);
        this.progressBar=this.add.graphics().setDepth(21); this._updateProgress();
        ui.fillStyle(0x795548,1); ui.fillRect(375,0,15,90);
        ui.fillStyle(0x8D6E63,1); ui.fillRoundedRect(250,20,290,65,10);
        ui.fillStyle(0x795548,1); ui.fillRoundedRect(255,25,280,55,5);
        this.add.text(395,40,'Smash Correct:',{font:'bold 13px Arial',fill:'#FFF'}).setOrigin(0.5).setDepth(21);
        this.add.text(395,65,'+10 pts',{font:'bold 22px "Arial Black"',fill:'#00E676'}).setOrigin(0.5).setDepth(21);
        this.createSmallBtn(750,570,'Home',0x3F51B5,()=>this.scene.start('LevelSelectScene'));
        this.createSmallBtn(680,570,'Reset',0xFF5722,()=>this.scene.restart());
    }
    _updateProgress() {
        this.progressBar.clear();
        let pct=Math.min(this.score/this.targetScore,1), w=760*pct;
        if (w>0) { let c=pct<0.5?0xF39C12:(pct<0.9?0x27AE60:0x00E676); this.progressBar.fillStyle(c,1); this.progressBar.fillRoundedRect(20,90,w,18,4); }
    }
    createSmallBtn(x,y,text,color,onClick) {
        let g=this.add.graphics().setDepth(150); g.fillStyle(color,1); g.fillRoundedRect(x-30,y-15,60,30,8);
        this.add.text(x,y,text,{font:'bold 12px Arial',fill:'#FFF'}).setOrigin(0.5).setDepth(151);
        let z=this.add.zone(x,y,70,40).setInteractive({cursor:'pointer'}).setDepth(151);
        z.on('pointerover',()=>{ this.isHammerActive=false; this.hammer.setVisible(false); this.input.setDefaultCursor('pointer'); });
        z.on('pointerout', ()=>{ this.isHammerActive=true;  this.hammer.setVisible(true);  this.input.setDefaultCursor('none'); });
        z.on('pointerdown',onClick);
    }
    queueSpawn() { this.time.delayedCall(Phaser.Math.Between(1500,3000),()=>{ if(!this.gameOver){ this.spawnMole(); this.queueSpawn(); } }); }
    spawnMole() {
        let inactive=this.moles.filter(m=>!m.isActive&&!m.wasHit); if(!inactive.length) return;
        Phaser.Utils.Array.GetRandom(inactive).pop(generatePowerOf10Equation(this.level),Phaser.Math.Between(3000,5000));
    }
    checkHit(mole) {
        mole.hit();
        if (mole.isEquationCorrect) {
            this.score+=10; this.comboCount++; this.scoreText.setText(this.score.toString()); this._updateProgress();
            showCorrectFeedback(this,mole.x,mole.y); SoundEffect.playCorrect();
            if (this.comboCount===3)  showComboText(this,'3 hits Great!');
            else if (this.comboCount===5)  showComboText(this,'5 hits Awesome!');
            else if (this.comboCount===10) showComboText(this,'10 hits Master!');
            if (this.score>=this.targetScore) {
                this.gameOver=true; SoundEffect.playWin();
                this.time.delayedCall(800,()=>this.scene.start('GameOverScene',{score:this.score,won:true,level:this.level}));
            }
            this.events.emit('scoreUpdate');
        } else {
            this.comboCount=0; showIncorrectFeedback(this,mole.x,mole.y); SoundEffect.playWrong();
        }
    }
}

// ════════════════════════════════════════════════════════
// SCENE 5 — GAME OVER
// ════════════════════════════════════════════════════════
class GameOverScene extends Phaser.Scene {
    constructor() { super('GameOverScene'); }
    init(data) { this.finalScore=data.score||0; this.won=data.won||false; this.level=data.level||'easy'; }
    create() {
        drawDesertBackground(this); this.input.setDefaultCursor('default');
        let overlay=this.add.graphics().setDepth(5); overlay.fillStyle(0x000000,0.5); overlay.fillRect(0,0,800,600);
        let board=this.add.graphics().setDepth(5); board.fillStyle(0x8B4513,1); board.fillRoundedRect(170,130,460,340,20); board.fillStyle(0xA0522D,1); board.fillRoundedRect(180,140,440,320,15);
        if (this.won) {
            this.add.text(400,200,'🎉 Well Done!',{font:'bold 52px Arial',fill:'#FFD700',stroke:'#000',strokeThickness:6}).setOrigin(0.5).setDepth(6);
            this.add.text(400,270,'Target Reached!',{font:'bold 26px Arial',fill:'#00E676'}).setOrigin(0.5).setDepth(6);
        } else {
            this.add.text(400,210,'Keep Going!',{font:'bold 48px Arial',fill:'#FFD700',stroke:'#000',strokeThickness:6}).setOrigin(0.5).setDepth(6);
        }
        this.add.text(400,330,`Score: ${this.finalScore} / ${TARGET_SCORES[this.level]}`,{font:'bold 32px Arial',fill:'#FFF'}).setOrigin(0.5).setDepth(6);
        let pbtn=this.add.graphics().setDepth(6); pbtn.fillStyle(0x4CAF50,1); pbtn.fillRoundedRect(300,388,200,44,10);
        let zone=this.add.zone(400,410,200,44).setInteractive({cursor:'pointer'}); zone.on('pointerdown',()=>this.scene.start('LevelSelectScene'));
        this.add.text(400,410,'Play Again',{font:'bold 24px Arial',fill:'#FFF'}).setOrigin(0.5).setDepth(7);
    }
}
